<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Study Summariser</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">📚</div>
      <h1>Welcome Back</h1>
      <p class="auth-sub">Log in to access your summaries</p>

      <div class="error-box" id="errorBox" hidden></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn-auth" id="loginBtn">Log In</button>
      <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>
  <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('errorBox');
      const btn = document.getElementById('loginBtn');
      errorBox.hidden = true;
      btn.textContent = 'Logging in...';
      btn.disabled = true;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        window.location.href = '/index.html';
      } catch (err) {
        errorBox.textContent = '❌ ' + err.message;
        errorBox.hidden = false;
      } finally {
        btn.textContent = 'Log In';
        btn.disabled = false;
      }
    });

    // Allow Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
